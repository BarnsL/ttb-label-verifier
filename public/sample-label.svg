<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="Georgia, 'Times New Roman', serif">
  <rect width="600" height="800" fill="#f3ead7"/>
  <rect x="20" y="20" width="560" height="760" fill="none" stroke="#3a2c1a" stroke-width="3"/>
  <rect x="30" y="30" width="540" height="740" fill="none" stroke="#3a2c1a" stroke-width="1"/>

  <text x="300" y="150" text-anchor="middle" font-size="44" letter-spacing="3" fill="#3a2c1a" font-weight="bold">OLD TOM</text>
  <text x="300" y="200" text-anchor="middle" font-size="40" letter-spacing="6" fill="#3a2c1a" font-weight="bold">DISTILLERY</text>

  <line x1="160" y1="240" x2="440" y2="240" stroke="#7a5c2e" stroke-width="2"/>
  <text x="300" y="285" text-anchor="middle" font-size="22" fill="#5a4326" font-style="italic">Kentucky Straight Bourbon Whiskey</text>
  <line x1="160" y1="310" x2="440" y2="310" stroke="#7a5c2e" stroke-width="2"/>

  <text x="300" y="380" text-anchor="middle" font-size="20" fill="#3a2c1a">Distilled and bottled by</text>
  <text x="300" y="408" text-anchor="middle" font-size="20" fill="#3a2c1a">Old Tom Distillery Co., Bardstown, Kentucky</text>

  <text x="300" y="470" text-anchor="middle" font-size="24" fill="#3a2c1a" font-weight="bold">45% Alc./Vol. (90 Proof)</text>
  <text x="300" y="505" text-anchor="middle" font-size="22" fill="#3a2c1a">750 mL</text>

  <rect x="70" y="560" width="460" height="180" fill="none" stroke="#3a2c1a" stroke-width="1"/>
  <text x="90" y="600" font-size="14" fill="#1a1a1a" font-weight="bold" font-family="Arial, sans-serif">GOVERNMENT WARNING:</text>
  <text x="90" y="624" font-size="13" fill="#1a1a1a" font-family="Arial, sans-serif">(1) According to the Surgeon General, women should not drink</text>
  <text x="90" y="642" font-size="13" fill="#1a1a1a" font-family="Arial, sans-serif">alcoholic beverages during pregnancy because of the risk of</text>
  <text x="90" y="660" font-size="13" fill="#1a1a1a" font-family="Arial, sans-serif">birth defects. (2) Consumption of alcoholic beverages impairs</text>
  <text x="90" y="678" font-size="13" fill="#1a1a1a" font-family="Arial, sans-serif">your ability to drive a car or operate machinery, and may</text>
  <text x="90" y="696" font-size="13" fill="#1a1a1a" font-family="Arial, sans-serif">cause health problems.</text>
</svg>
